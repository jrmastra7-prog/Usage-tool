<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smogon Replay Extractor - Auto</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-color: #e0e0e0;
            --accent-color: #4a148c;
            --accent-hover: #6a1b9a;
            --success-color: #00796b;
            --external-btn-bg: #2d2d2d;
            --external-btn-border: #444;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 900px;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 8px;
            border: 1px solid #2d2d2d;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        h1 {
            text-align: center;
            color: #ff4500;
            margin-top: 0;
            font-size: 24px;
            border-bottom: 2px solid #2d2d2d;
            padding-bottom: 10px;
        }

        /* External Links / Buttons */
        .external-links {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 1px dashed #3d3d3d;
        }

        .btn-external {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background-color: var(--external-btn-bg);
            color: #fff;
            border: 1px solid var(--external-btn-border);
            padding: 8px 16px;
            border-radius: 4px;
            text-decoration: none;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.2s ease;
        }

        .btn-external:hover {
            background-color: #3d3d3d;
            border-color: #ff4500;
            color: #ff4500;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        input[type="text"] {
            flex: 1;
            padding: 12px;
            border: 1px solid #3d3d3d;
            border-radius: 4px;
            background-color: #0a0a0a;
            color: #fff;
            font-size: 14px;
            font-family: monospace;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #ff4500;
        }

        button {
            padding: 12px 25px;
            background-color: var(--accent-color);
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 14px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }

        button:hover {
            background-color: var(--accent-hover);
        }

        button:disabled {
            background-color: #444;
            color: #888;
            cursor: not-allowed;
        }

        .status {
            margin-top: 15px;
            font-style: italic;
            color: #ffa726;
            font-weight: 500;
            text-align: center;
        }

        .btn-copy-all {
            background-color: var(--success-color);
            width: 100%;
            margin-bottom: 20px;
            font-size: 16px;
        }

        .btn-copy-all:hover {
            background-color: #00897b;
        }

        .tier-block {
            background: #1a1a1a;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 25px;
            border: 1px solid #2d2d2d;
        }

        .header-inline {
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #333;
            padding-bottom: 5px;
            margin-bottom: 10px;
        }

        .tier-block h3 {
            margin: 0;
            color: #ff4500;
        }

        pre {
            background-color: #0a0a0a;
            padding: 15px;
            border-left: 4px solid var(--accent-color);
            border-radius: 4px;
            overflow-x: auto;
            font-family: monospace;
            font-size: 13px;
            line-height: 1.5;
            color: #a4c2f4;
        }

        .btn-copy-tier {
            background-color: #333;
            border: 1px solid #ffaa00;
            color: #ffaa00;
            padding: 4px 10px;
            font-size: 12px;
        }

        .btn-copy-tier:hover {
            background-color: #ffaa00;
            color: #121212;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Smogon Replay Extractor & Tier Sorter 🌐</h1>
    
    <div class="external-links">
        <a href="http://replaystats-eo.herokuapp.com/" target="_blank" class="btn-external"> ReplayStats Usage</a>
        <a href="https://my-tour-tools-g3ueumybpdeu2afbsls8ru.streamlit.app/" target="_blank" class="btn-external"> Tera Usage Tools</a>
    </div>

    <p>Enter the Smogon thread URL to automatically extract and sort all replays by Tier (scans all pages).</p>
    
    <div class="input-group">
        <input type="text" id="threadUrl" placeholder="Example: https://www.smogon.com/forums/threads/puff-league-i-week-two.3784596/">
        <button id="btnSubmit" onclick="startScraping()">Launch Analysis</button>
    </div>

    <div id="status" class="status"></div>
    <div id="resultsArea" style="display:none; margin-top: 30px;">
        <div id="outputs"></div>
    </div>
</div>

<script>
    const CORS_PROXY = "https://corsproxy.io/?";

    async function startScraping() {
        let url = document.getElementById('threadUrl').value.trim();
        const statusDiv = document.getElementById('status');
        const resultsArea = document.getElementById('resultsArea');
        const outputs = document.getElementById('outputs');
        const btn = document.getElementById('btnSubmit');

        if (!url) {
            statusDiv.innerText = " Please enter a valid Smogon forum URL.";
            return;
        }

        url = url.replace(/\/page-\d+/, '').replace(/\/$/, '');
        btn.disabled = true;
        resultsArea.style.display = "none";
        outputs.innerHTML = "";
        
        let allReplayLinks = new Set();
        let currentPage = 1;
        let hasNextPage = true;

        statusDiv.innerText = "⏳ Connecting to Smogon forums...";

        while (hasNextPage) {
            statusDiv.innerText = `🔍 Scanning page ${currentPage} of the Smogon thread...`;
            let targetUrl = currentPage === 1 ? url : url + "/page-" + currentPage;
            
            try {
                const response = await fetch(CORS_PROXY + encodeURIComponent(targetUrl));
                if (!response.ok) { hasNextPage = false; break; }
                const htmlText = await response.text();

                const regex = /https:\/\/replay\.pokemonshowdown\.com\/[a-zA-Z0-9-]+/g;
                const matches = htmlText.match(regex);
                if (matches) {
                    matches.forEach(link => allReplayLinks.add(link));
                }

                if (htmlText.includes('pageNav-jump--next') || htmlText.includes(`data-page="${currentPage + 1}"`)) {
                    currentPage++;
                } else {
                    hasNextPage = false;
                }
            } catch (err) {
                console.error(err);
                hasNextPage = false;
            }
        }

        const linksArray = [...allReplayLinks];
        if (linksArray.length === 0) {
            statusDiv.innerText = " No Showdown replays found in this thread.";
            btn.disabled = false;
            return;
        }

        statusDiv.innerText = `🔹 Found ${linksArray.length} unique replays. Identifying Tiers via Showdown API...`;

        let formatData = {}; 

        for (let i = 0; i < linksArray.length; i++) {
            const replayUrl = linksArray[i];
            statusDiv.innerText = ` Analyzing match ${i + 1} / ${linksArray.length}...`;

            let formatMatch = replayUrl.match(/https:\/\/replay\.pokemonshowdown\.com\/([a-zA-Z0-9]+)-\d+/);
            let estimatedFormat = formatMatch ? formatMatch[1] : "unknown";

            try {
                const res = await fetch(replayUrl + '.json');
                if (!res.ok) {
                    if (!formatData[estimatedFormat]) formatData[estimatedFormat] = new Set();
                    formatData[estimatedFormat].add(replayUrl);
                    continue;
                }
                const data = await res.json();
                const format = data.formatid || estimatedFormat;

                if (!formatData[format]) {
                    formatData[format] = new Set();
                }
                formatData[format].add(replayUrl);

            } catch (err) {
                if (!formatData[estimatedFormat]) formatData[estimatedFormat] = new Set();
                formatData[estimatedFormat].add(replayUrl);
            }
        }

        statusDiv.innerText = ` Analysis complete! ${linksArray.length} replays sorted successfully.`;
        btn.disabled = false;

        let globalCopyText = "";
        const sortedFormats = Object.keys(formatData).sort();

        const btnCopyAll = document.createElement('button');
        btnCopyAll.className = 'btn-copy-all';
        btnCopyAll.innerText = " Copy ALL Tiers at Once";
        outputs.appendChild(btnCopyAll);

        sortedFormats.forEach((format) => {
            let linksSet = formatData[format];
            let blockText = `=== TIER : ${format.toUpperCase()} ===\n`;
            linksSet.forEach(l => blockText += `${l}\n`);
            blockText += `\n`;

            globalCopyText += blockText;

            let genBlock = document.createElement('div');
            genBlock.className = 'tier-block';
            genBlock.innerHTML = `
                <div class="header-inline">
                    <h3>Format: ${format.toUpperCase()} (${linksSet.size} replays)</h3>
                    <button class="btn-copy-tier" id="btn-copy-${format}">Copy This Tier</button>
                </div>
                <pre>${[...linksSet].join('\n')}</pre>
            `;
            outputs.appendChild(genBlock);

            document.getElementById(`btn-copy-${format}`).onclick = () => {
                navigator.clipboard.writeText(blockText.trim());
                alert(`Link(s) for tier ${format.toUpperCase()} copied!`);
            };
        });

        btnCopyAll.onclick = () => {
            navigator.clipboard.writeText(globalCopyText.trim());
            alert("All sorted replays have been copied to your clipboard!");
        };

        resultsArea.style.display = "block";
    }
</script>
</body>
</html>
